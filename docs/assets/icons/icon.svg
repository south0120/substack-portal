<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Substack Portal — 本棚アイコン (flat / 2段棚) -->
  <rect width="512" height="512" rx="112" fill="#BCE79F"/>

  <!-- 上段の本 -->
  <g>
    <rect x="104" y="106" width="44" height="118" rx="8" fill="#2d6a4f"/>
    <rect x="158" y="118" width="40" height="106" rx="8" fill="#52b788"/>
    <rect x="208" y="98"  width="48" height="126" rx="8" fill="#40916c"/>
    <!-- 傾いた本 -->
    <rect x="284" y="108" width="40" height="116" rx="8" fill="#2d6a4f" transform="rotate(12 304 224)"/>
    <rect x="344" y="118" width="44" height="106" rx="8" fill="#52b788"/>
  </g>
  <!-- 上段の棚板 -->
  <rect x="84" y="224" width="344" height="22" rx="11" fill="#2d6a4f"/>

  <!-- 下段の本 -->
  <g>
    <rect x="104" y="262" width="40" height="118" rx="8" fill="#52b788"/>
    <rect x="154" y="274" width="46" height="106" rx="8" fill="#40916c"/>
    <!-- 横積みの本 -->
    <rect x="216" y="318" width="112" height="30" rx="8" fill="#2d6a4f"/>
    <rect x="226" y="350" width="112" height="30" rx="8" fill="#52b788"/>
    <rect x="356" y="262" width="44" height="118" rx="8" fill="#2d6a4f"/>
  </g>
  <!-- 下段の棚板 -->
  <rect x="84" y="380" width="344" height="22" rx="11" fill="#2d6a4f"/>
</svg>
