<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>FYL 管理ダッシュボード</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root{--brand:#FF6719;--brand-soft:#FFF1E8;--ink:#2b2622;--sub:#8a7f74;--line:#ece6dd;--card:#fff;--bg:#f7f4ef}
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,-apple-system,"Segoe UI","Hiragino Kaku Gothic ProN",sans-serif;background:var(--bg);color:var(--ink)}
  a{color:var(--brand)}
  /* ログイン */
  #login{min-height:100vh;display:grid;place-items:center;padding:20px}
  .login-card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:30px;width:min(100%,360px);box-shadow:0 10px 30px rgba(80,60,30,.08);text-align:center}
  .login-card h1{font-size:1.15rem;margin:0 0 4px}
  .login-card p{color:var(--sub);font-size:.82rem;margin:0 0 18px}
  .login-card input{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:10px;font-size:1rem;margin-bottom:12px}
  .login-card input:focus{outline:none;border-color:var(--brand)}
  .btn{background:var(--brand);color:#fff;border:0;border-radius:10px;padding:12px 18px;font-weight:700;font-size:.95rem;cursor:pointer;width:100%}
  .btn:hover{background:#e85c12}
  .err{color:#d6452f;font-size:.82rem;margin-top:10px;min-height:1em}
  /* ダッシュボード */
  #dash{display:none;max-width:1100px;margin:0 auto;padding:18px 16px 60px}
  header.bar{display:flex;align-items:center;justify-content:space-between;padding:6px 2px 16px}
  header.bar h1{font-size:1.1rem;margin:0}
  header.bar .logout{background:none;border:1px solid var(--line);color:var(--sub);border-radius:8px;padding:7px 12px;font-size:.8rem;cursor:pointer}
  .range-filter{display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:14px}
  .range-filter button{background:var(--bg);color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:7px 11px;font-weight:700;cursor:pointer}
  .range-filter button.active,.range-filter .apply{background:var(--brand);border-color:var(--brand);color:#fff}
  .range-filter input{background:var(--card);color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:6px 8px}
  .range-filter .current{color:var(--sub);font-size:.76rem;margin-left:auto}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:18px}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px}
  .kpi .label{color:var(--sub);font-size:.74rem;font-weight:700}
  .kpi .val{font-size:1.7rem;font-weight:900;margin-top:4px}
  .kpi .val small{font-size:.8rem;color:var(--sub);font-weight:700}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:16px}
  .heatmap{display:grid;grid-template-columns:auto repeat(24,1fr);gap:3px;overflow-x:auto;font-size:.62rem}
  .heatmap .hcell{aspect-ratio:1/1;border-radius:3px;min-width:13px;background:var(--brand-soft)}
  .heatmap .hlabel{color:var(--sub);display:flex;align-items:center;justify-content:center;white-space:nowrap;padding:0 4px}
  .heatmap .hcol{color:var(--sub);text-align:center}
  .heat-legend{display:flex;align-items:center;gap:6px;margin-top:10px;color:var(--sub);font-size:.72rem}
  .heat-scale{display:inline-block;width:120px;height:10px;border-radius:5px;background:linear-gradient(90deg,var(--brand-soft),#FF6719)}
  .panel h2{font-size:.9rem;margin:0 0 12px;display:flex;align-items:center;justify-content:space-between}
  .panel h2 .csv{font-size:.72rem;font-weight:700;background:var(--brand-soft);color:#9A410F;border:0;border-radius:7px;padding:5px 9px;cursor:pointer;flex:none}
  .panel h2 .period{font-weight:400;font-size:.72rem;color:var(--sub);margin-left:6px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:720px){.grid2{grid-template-columns:1fr}}
  table{width:100%;border-collapse:collapse;font-size:.8rem}
  th,td{text-align:left;padding:8px 8px;border-bottom:1px solid var(--line);white-space:nowrap}
  th{color:var(--sub);font-size:.72rem;position:sticky;top:0;background:var(--card)}
  td.num,th.num{text-align:right}
  .tablewrap{max-height:460px;overflow:auto;border:1px solid var(--line);border-radius:10px}
  .cat-list .row{display:flex;align-items:center;gap:8px;margin-bottom:7px;font-size:.8rem}
  .cat-list .bar{height:9px;border-radius:5px;background:var(--brand)}
  .cat-list .nm{width:96px;flex:none;font-weight:700}
  .cat-list .ct{color:var(--sub);font-size:.74rem;white-space:nowrap}
  .muted{color:var(--sub);font-size:.78rem}
  @media(max-width:720px){.range-filter .current{width:100%;margin-left:0}}
</style>
</head>
<body>

<div id="login">
  <form class="login-card" id="loginForm">
    <h1>FYL 管理ダッシュボード</h1>
    <p>パスワードでログイン</p>
    <input type="password" id="pw" placeholder="パスワード" autocomplete="current-password" required>
    <button class="btn" type="submit">ログイン</button>
    <div class="err" id="loginErr"></div>
  </form>
</div>

<div id="dash">
  <header class="bar">
    <div>
      <h1>📊 Find Your Letter 管理ダッシュボード</h1>
      <div class="muted" id="asof" style="font-size:.72rem;margin-top:3px"></div>
    </div>
    <button class="logout" id="logout">ログアウト</button>
  </header>

  <div class="range-filter">
    <button type="button" data-range-days="7">7d</button>
    <button type="button" data-range-days="30">30d</button>
    <button type="button" data-range-days="90">90d</button>
    <button type="button" data-range-all>All</button>
    <input type="date" id="rangeFrom" aria-label="開始日">
    <span>〜</span>
    <input type="date" id="rangeTo" aria-label="終了日">
    <button type="button" class="apply" id="rangeApply">適用</button>
    <span class="current" id="rangeLabel">全期間</span>
  </div>

  <div class="kpis" id="kpis"></div>

  <div class="panel" id="costPanel" style="display:none">
    <h2>API料金（記事カテゴリ判定 / Claude Haiku）</h2>
    <div class="kpis" id="costKpis" style="margin-bottom:8px"></div>
    <div class="muted" id="costNote" style="font-size:.72rem"></div>
  </div>

  <div class="grid2">
    <div class="panel">
      <h2>投稿が多い時間帯（JST）</h2>
      <canvas id="hourChart" height="160"></canvas>
    </div>
    <div class="panel">
      <h2>日次の新着記事数（選択期間）</h2>
      <canvas id="dayChart" height="160"></canvas>
    </div>
  </div>

  <div class="panel" id="heatmapPanel">
    <h2>曜日 × 時間帯の投稿件数（JST）</h2>
    <div class="muted" style="font-size:.72rem;margin-bottom:10px">マスの色が濃いほど、その曜日・時間帯に公開された記事が多いことを表します</div>
    <div id="heatmap" class="heatmap"></div>
    <div class="heat-legend"><span>少</span><span class="heat-scale"></span><span>多</span><span id="heatMax" class="muted" style="font-size:.72rem;margin-left:8px"></span></div>
  </div>

  <div class="panel" id="distributionPanel" style="display:none">
    <h2>書き手ごとの記事数分布（選択期間）</h2>
    <canvas id="distributionChart" height="120"></canvas>
  </div>

  <div class="panel">
    <h2>記事数・ライター数の推移（毎朝記録）</h2>
    <canvas id="trendChart" height="120"></canvas>
    <div class="muted" id="trendNote" style="margin-top:8px"></div>
  </div>

  <div class="grid2">
    <div class="panel">
      <h2>カテゴリ別 <button class="csv" data-csv="category">CSV</button></h2>
      <div class="cat-list" id="catList"></div>
    </div>
    <div class="panel">
      <h2>サマリー</h2>
      <div id="summary" class="muted"></div>
    </div>
  </div>

  <div class="panel">
    <h2><span>書き手一覧（<span id="writerCount">0</span>名）<span class="period" id="writerPeriod">｜記事数は全期間の累計</span></span> <button class="csv" data-csv="writers">CSV</button></h2>
    <div class="tablewrap">
      <table id="writerTable">
        <thead><tr><th>#</th><th>書き手</th><th>カテゴリ</th><th class="num">記事数</th><th>最古記事(取得済)</th><th>最新投稿</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const API = "https://fyl-api.south0120.workers.dev";
const DAILY_CSV = "https://raw.githubusercontent.com/south0120/substack-portal/main/reports/daily_stats.csv";
const USAGE_URL = "data/api_usage.json";
const TKEY = "fyl_admin_token";
let DATA = { overview:null, writers:null, trend:null };
let RANGE = { from:null, to:null };

function token(){ return localStorage.getItem(TKEY) || ""; }
function authHeaders(){ return { "Authorization": "Bearer " + token() }; }

async function api(path){
  const r = await fetch(API + path, { headers: authHeaders() });
  if(r.status === 401){ logout(); throw new Error("unauthorized"); }
  if(!r.ok) throw new Error("HTTP " + r.status);
  return r.json();
}

function showLogin(){ document.getElementById("login").style.display="grid"; document.getElementById("dash").style.display="none"; }
function showDash(){ document.getElementById("login").style.display="none"; document.getElementById("dash").style.display="block"; }
function logout(){ localStorage.removeItem(TKEY); showLogin(); }

document.getElementById("logout").addEventListener("click", logout);

document.getElementById("loginForm").addEventListener("submit", async (e)=>{
  e.preventDefault();
  const err = document.getElementById("loginErr"); err.textContent="";
  try{
    const r = await fetch(API + "/api/admin/login", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ password: document.getElementById("pw").value })
    });
    if(!r.ok){ err.textContent = "パスワードが違います"; return; }
    const d = await r.json();
    localStorage.setItem(TKEY, d.token);
    document.getElementById("pw").value="";
    init();
  }catch(_){ err.textContent = "接続エラー。少し待って再度お試しください"; }
});

const fmt = (n)=> (n==null?"-":Number(n).toLocaleString());
const dateJp = (s)=>{ if(!s) return "-"; const d=new Date(s); return Number.isNaN(d.getTime())?"-":`${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`; };
const isoDay = (d)=> d.toISOString().slice(0,10);
function jstDay(s){
  if(!s) return "";
  const normalized = /^\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}$/.test(s) ? s.replace(" ","T")+"Z" : s;
  const d = new Date(normalized);
  return Number.isNaN(d.getTime()) ? String(s).slice(0,10) : isoDay(new Date(d.getTime()+9*60*60*1000));
}

function renderKpis(o){
  const ranged = o.rangeTotals ? `
    <div class="kpi"><div class="label">選択期間の記事数</div><div class="val">${fmt(o.rangeTotals.articles)}</div></div>
    <div class="kpi"><div class="label">選択期間のライター数</div><div class="val">${fmt(o.rangeTotals.writers)}</div></div>` : "";
  document.getElementById("kpis").innerHTML = `
    <div class="kpi"><div class="label">総記事数</div><div class="val">${fmt(o.totals.articles)}</div></div>
    <div class="kpi"><div class="label">総ライター数</div><div class="val">${fmt(o.totals.writers)}</div></div>
    ${ranged}
    <div class="kpi"><div class="label">本日の新着記事</div><div class="val">${fmt((o.perDay[o.perDay.length-1]||{}).articles)} <small>件</small></div></div>
    <div class="kpi"><div class="label">カテゴリ数</div><div class="val">${o.byCategory.length}</div></div>`;
}

const CCOL = ["#FF6719","#3a86c8","#4caf6e","#ef8aa6","#f7c948","#7b5ea7","#e8543e","#5bb0d6","#caa030","#9b6dc4"];
function renderCatList(o){
  const max = Math.max(1, ...o.byCategory.map(c=>c.articles));
  document.getElementById("catList").innerHTML = o.byCategory.map((c,i)=>`
    <div class="row"><span class="nm" title="${c.category}">${c.category}</span>
      <span class="bar" style="width:${Math.round(c.articles/max*160)}px;background:${CCOL[i%CCOL.length]}"></span>
      <span class="ct">記事${fmt(c.articles)} / 書き手${fmt(c.writers)}</span></div>`).join("");
}

function renderSummary(o){
  const topHour = [...o.byHour].sort((a,b)=>b.count-a.count)[0];
  const topCat = o.byCategory[0];
  const totals = o.rangeTotals || o.totals;
  document.getElementById("summary").innerHTML = `
    ・最も投稿が多い時間帯：<b>${topHour?topHour.hour:"-"}時台</b>（${fmt(topHour&&topHour.count)}件）<br>
    ・記事数が最も多いカテゴリ：<b>${topCat?topCat.category:"-"}</b>（${fmt(topCat&&topCat.articles)}件）<br>
    ・書き手が最も多いカテゴリ：<b>${[...o.byCategory].sort((a,b)=>b.writers-a.writers)[0]?.category||"-"}</b><br>
    ・1書き手あたり平均記事数：<b>${(totals.articles/Math.max(1,totals.writers)).toFixed(1)}</b>件`;
}

function renderWriters(ws){
  document.getElementById("writerCount").textContent = ws.length;
  const tb = document.querySelector("#writerTable tbody");
  tb.innerHTML = ws.map((w,i)=>`<tr>
    <td>${i+1}</td>
    <td>${w.url?`<a href="${w.url}" target="_blank" rel="noopener">${esc(w.name)}</a>`:esc(w.name)}</td>
    <td>${(w.categories||[]).join("・")||"-"}</td>
    <td class="num">${fmt(w.articleCount)}</td>
    <td>${dateJp(w.firstArticle)}</td>
    <td>${dateJp(w.lastArticle)}</td></tr>`).join("");
}
function esc(s){ return String(s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

let charts = {};
function bar(id, labels, data, color, label){
  if(charts[id]) charts[id].destroy();
  charts[id] = new Chart(document.getElementById(id), {
    type:"bar",
    data:{ labels, datasets:[{ label, data, backgroundColor:color, borderRadius:4 }] },
    options:{ plugins:{legend:{display:false}}, scales:{ y:{beginAtZero:true,ticks:{precision:0}} } }
  });
}
function line(id, labels, datasets){
  if(charts[id]) charts[id].destroy();
  charts[id] = new Chart(document.getElementById(id), {
    type:"line",
    data:{ labels, datasets },
    options:{ plugins:{legend:{display:datasets.length>1}}, scales:{ y:{beginAtZero:false,ticks:{precision:0}} },
      elements:{point:{radius:2}}, interaction:{intersect:false,mode:"index"} }
  });
}

async function renderCost(){
  let u;
  try{ u = await (await fetch(USAGE_URL + "?cb=" + Date.now())).json(); }catch(_){ return; }
  if(!u) return;
  const usd = (n)=> "$" + Number(n||0).toFixed(2);
  const cum = u.cumulative || {};
  const month = new Date().toISOString().slice(0,7);
  const m = (u.monthly || {})[month] || {};
  const last = u.last_run || {};
  document.getElementById("costKpis").innerHTML = `
    <div class="kpi"><div class="label">今月（${month}）</div><div class="val">${usd(m.cost_usd)}</div></div>
    <div class="kpi"><div class="label">累計</div><div class="val">${usd(cum.cost_usd)}</div></div>
    <div class="kpi"><div class="label">累計トークン</div><div class="val" style="font-size:1.1rem">${fmt(cum.input_tokens)} <small>in</small> / ${fmt(cum.output_tokens)} <small>out</small></div></div>
    <div class="kpi"><div class="label">前回の判定</div><div class="val" style="font-size:1.1rem">${usd(last.cost_usd)} <small>${fmt(last.writers_classified)}名</small></div></div>`;
  const r = u.rates_usd_per_mtok || {};
  const upd = u.updated_at ? dateJp(u.updated_at) : "未集計";
  document.getElementById("costNote").textContent =
    `モデル ${u.model||"-"}（入力 $${r.input}/出力 $${r.output} per 1Mトークン）　｜　最終集計 ${upd}　｜　記事の自動カテゴリ判定にかかるAI APIの実費`;
  document.getElementById("costPanel").style.display = "block";
}

async function renderTrend(){
  try{
    if(!DATA.trend){
      const txt = await (await fetch(DAILY_CSV + "?cb=" + Date.now())).text();
      DATA.trend = txt.trim().split("\n").slice(1).map(l=>l.split(","));
    }
    const rows = DATA.trend.filter(r=>(!RANGE.from||r[0]>=RANGE.from)&&(!RANGE.to||r[0]<=RANGE.to));
    const labels = rows.map(r=>r[0]);
    const arts = rows.map(r=>Number(r[1])), wrs = rows.map(r=>Number(r[2]));
    line("trendChart", labels, [
      { label:"記事数", data:arts, borderColor:"#FF6719", backgroundColor:"rgba(255,103,25,.08)", yAxisID:"y", fill:true, tension:.3 },
      { label:"ライター数", data:wrs, borderColor:"#3a86c8", yAxisID:"y2", tension:.3 }
    ]);
    charts.trendChart.options.scales.y2 = { position:"right", beginAtZero:false, grid:{drawOnChartArea:false}, ticks:{precision:0} };
    charts.trendChart.update();
    document.getElementById("trendNote").textContent = labels.length
      ? `${labels[0]} 〜 ${labels[labels.length-1]} の毎朝8:00記録`
      : "選択期間の推移データはありません";
  }catch(_){ document.getElementById("trendNote").textContent = "推移データはまだ記録が少ないか取得に失敗しました"; }
}

function renderRangeControls(o){
  const oldest = jstDay(o.dateRange&&o.dateRange.oldest);
  const newest = jstDay(o.dateRange&&o.dateRange.newest);
  for(const id of ["rangeFrom","rangeTo"]){
    const el = document.getElementById(id);
    el.min = oldest; el.max = newest;
  }
  document.getElementById("rangeFrom").value = RANGE.from || "";
  document.getElementById("rangeTo").value = RANGE.to || "";
  document.getElementById("rangeLabel").textContent = RANGE.from||RANGE.to
    ? `${RANGE.from||oldest||"開始"} 〜 ${RANGE.to||newest||"終了"}`
    : "全期間";
  document.querySelectorAll("[data-range-days],[data-range-all]").forEach(btn=>btn.classList.remove("active"));
  if(!RANGE.from&&!RANGE.to) document.querySelector("[data-range-all]").classList.add("active");
}

const DOW_JP = ["日","月","火","水","木","金","土"];
function heatColor(ratio){
  const c0=[255,241,232], c1=[255,103,25];
  const t = Math.pow(Math.max(0,Math.min(1,ratio)), 0.6); // 件数の少ないマスも見えるようガンマ補正
  const ch=(i)=>Math.round(c0[i]+(c1[i]-c0[i])*t);
  return `rgb(${ch(0)},${ch(1)},${ch(2)})`;
}
function renderHeatmap(o){
  const m = o.dowHour;
  const panel = document.getElementById("heatmapPanel");
  if(!Array.isArray(m) || m.length!==7){ panel.style.display="none"; return; }
  panel.style.display="block";
  let max=0;
  for(const row of m) for(const v of row) if(v>max) max=v;
  let html = `<div class="hcol"></div>`;
  for(let h=0;h<24;h++) html += `<div class="hcol">${h%3===0?h:""}</div>`;
  for(let d=0;d<7;d++){
    html += `<div class="hlabel">${DOW_JP[d]}</div>`;
    for(let h=0;h<24;h++){
      const v = Number((m[d]||[])[h]||0);
      const bg = v ? heatColor(max?v/max:0) : "var(--brand-soft)";
      html += `<div class="hcell" style="background:${bg}" title="${DOW_JP[d]}曜 ${h}時台：${v}件"></div>`;
    }
  }
  document.getElementById("heatmap").innerHTML = html;
  document.getElementById("heatMax").textContent = max ? `最大 ${fmt(max)}件/マス` : "";
}

function renderOverview(o){
  DATA.overview = o;
  const now = new Date();
  const pd = o.perDay || [];
  const shown = pd.length ? `${pd[0].date} 〜 ${pd[pd.length-1].date}` : "-";
  const p2 = (n)=>String(n).padStart(2,"0");
  document.getElementById("asof").textContent =
    `集計時点 ${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()} ${p2(now.getHours())}:${p2(now.getMinutes())}　｜　グラフ表示 ${shown}`;
  renderRangeControls(o);
  renderKpis(o);
  bar("hourChart", o.byHour.map(h=>h.hour+"時"), o.byHour.map(h=>h.count), "#FF6719", "投稿数");
  bar("dayChart", o.perDay.map(d=>d.date.slice(5)), o.perDay.map(d=>d.articles), "#3a86c8", "新着記事");
  renderHeatmap(o);
  renderCatList(o);
  renderSummary(o);
  const distribution = Array.isArray(o.articleCountDistribution) ? o.articleCountDistribution : null;
  document.getElementById("distributionPanel").style.display = distribution ? "block" : "none";
  if(distribution){
    bar("distributionChart", distribution.map(d=>d.bucket), distribution.map(d=>d.writers), "#7b5ea7", "書き手数");
  }else if(charts.distributionChart){
    charts.distributionChart.destroy(); delete charts.distributionChart;
  }
  renderTrend();
}

async function loadOverview(){
  const qs = new URLSearchParams();
  if(RANGE.from) qs.set("from",RANGE.from);
  if(RANGE.to) qs.set("to",RANGE.to);
  const overview = await api("/api/admin/overview" + (qs.size ? "?"+qs : ""));
  renderOverview(overview);
}

document.querySelectorAll("[data-range-days]").forEach(btn=>btn.addEventListener("click",async ()=>{
  const max = document.getElementById("rangeTo").max || isoDay(new Date());
  const from = new Date(max+"T00:00:00Z");
  from.setUTCDate(from.getUTCDate()-Number(btn.dataset.rangeDays)+1);
  RANGE = { from:isoDay(from), to:max };
  await loadOverview();
}));
document.querySelector("[data-range-all]").addEventListener("click",async ()=>{
  RANGE = { from:null, to:null };
  await loadOverview();
});
document.getElementById("rangeApply").addEventListener("click",async ()=>{
  const from = document.getElementById("rangeFrom").value||null;
  const to = document.getElementById("rangeTo").value||null;
  if(from&&to&&from>to){
    document.getElementById("rangeFrom").setCustomValidity("開始日は終了日以前にしてください");
    document.getElementById("rangeFrom").reportValidity();
    return;
  }
  document.getElementById("rangeFrom").setCustomValidity("");
  RANGE = { from, to };
  await loadOverview();
});

function downloadCsv(name, rows){
  const csv = rows.map(r=>r.map(c=>`"${String(c==null?"":c).replace(/"/g,'""')}"`).join(",")).join("\r\n");
  const blob = new Blob(["﻿"+csv], {type:"text/csv;charset=utf-8"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob); a.download = name; a.click();
  URL.revokeObjectURL(a.href);
}
document.querySelectorAll("[data-csv]").forEach(btn=>btn.addEventListener("click",()=>{
  const t = btn.dataset.csv;
  if(t==="category" && DATA.overview){
    downloadCsv("fyl_categories.csv", [["カテゴリ","記事数","書き手数"], ...DATA.overview.byCategory.map(c=>[c.category,c.articles,c.writers])]);
  } else if(t==="writers" && DATA.writers){
    downloadCsv("fyl_writers.csv", [["書き手","カテゴリ","記事数","最古記事(取得済)","最新投稿","URL"],
      ...DATA.writers.map(w=>[w.name,(w.categories||[]).join("・"),w.articleCount,w.firstArticle||"",w.lastArticle||"",w.url||""])]);
  }
}));

async function init(){
  // トークンが無くても一度APIを試す（開放モードなら401にならず表示できる）。
  try{
    const [overview, writersResp] = await Promise.all([ api("/api/admin/overview"), api("/api/admin/writers") ]);
    DATA.overview = overview; DATA.writers = writersResp.writers;
    showDash();
    renderOverview(overview);
    renderWriters(writersResp.writers);
    renderCost();
  }catch(e){ if(String(e.message)!=="unauthorized"){ showLogin(); } }
}
init();
</script>
