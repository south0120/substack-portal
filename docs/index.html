<style>
:root{
  --brand:#FF6719;--brand-soft:#FFF1E8;--brand-line:#FFD9C2;
  --bg:#F8F8F7;--card:#FFFFFF;--line:#E9E9E7;
  --ink:#1B1B1F;--sub:#60656E;--faint:#969CA5;
  --header-bg:rgba(255,255,255,.9);--nav-bg:rgba(255,255,255,.96);
  --tabs-bg:rgba(248,248,247,.96);--panel:#F7F7F8;--brand-ink:#9A410F;
  --radius:18px;--shadow:0 2px 10px rgba(24,24,32,.045);
  --shadow-hover:0 14px 34px rgba(24,24,32,.1);
  --control-shadow:0 1px 4px rgba(0,0,0,.08);
  --tooltip-shadow:0 12px 30px rgba(24,24,32,.14);
  --sheet-shadow:0 18px 48px rgba(24,24,32,.18);
  --modal-shadow:0 24px 70px rgba(0,0,0,.22);
  --modal-backdrop:rgba(27,27,31,.38);
  color-scheme:light dark;
  font-family:"Zen Kaku Gothic New","Hiragino Sans",sans-serif;
}
@media(prefers-color-scheme:dark){
  :root{
    --brand:#FF6719;--brand-soft:rgba(255,103,25,.16);--brand-line:rgba(255,103,25,.4);
    --bg:#141417;--card:#1E1E23;--line:#2E2E35;
    --ink:#ECECEF;--sub:#A7ACB6;--faint:#71767F;
    --header-bg:rgba(22,22,26,.92);--nav-bg:rgba(22,22,26,.92);
    --tabs-bg:rgba(20,20,23,.96);--panel:#28282E;--brand-ink:#FF9A66;
    --shadow:0 2px 10px rgba(0,0,0,.18);
    --shadow-hover:0 14px 34px rgba(0,0,0,.28);
    --control-shadow:0 1px 4px rgba(0,0,0,.28);
    --tooltip-shadow:0 12px 30px rgba(0,0,0,.32);
    --sheet-shadow:0 18px 48px rgba(0,0,0,.34);
    --modal-shadow:0 24px 70px rgba(0,0,0,.4);
    --modal-backdrop:rgba(0,0,0,.58);
  }
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--ink);font-family:inherit;line-height:1.6;padding-bottom:68px}
a{color:inherit;text-decoration:none}
button,input{font:inherit}
button{cursor:pointer}
img{display:block}
svg{stroke-linecap:round;stroke-linejoin:round}
button:focus-visible,a:focus-visible,input:focus-visible{
  outline:2px solid var(--brand);outline-offset:3px
}
.header{position:sticky;top:0;z-index:30;background:var(--header-bg);
  border-bottom:1px solid var(--line);backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  transition:transform .28s ease}
.header--hidden{transform:translateY(-100%);pointer-events:none}
.header-in{max-width:1280px;margin:auto;padding:11px 16px;display:flex;align-items:center;gap:12px}
.site-logo-link{flex:none;display:flex;align-items:center;text-decoration:none}
.site-logo{height:32px;width:auto;display:block}
.site-logo--dark{display:none}
@media(prefers-color-scheme:dark){
  .site-logo--light{display:none}
  .site-logo--dark{display:block}
}
/* モバイル: ロゴを検索バーの上に全幅で表示 */
@media(max-width:699px){
  .header-in{flex-wrap:wrap;padding:10px 14px 8px;gap:8px}
  .site-logo-link{width:100%;justify-content:center}
  .site-logo{height:26px}
  .search{max-width:none}
  .search input{font-size:16px}
}
.search{position:relative;flex:1;min-width:0;margin-left:auto;max-width:460px}
.search svg{position:absolute;left:12px;top:50%;width:17px;height:17px;
  transform:translateY(-50%);color:var(--faint);pointer-events:none}
.search input{width:100%;height:40px;border:1px solid var(--line);border-radius:12px;
  background:var(--card);padding:0 12px 0 38px;color:var(--ink);font-size:1rem}
.search input:focus{outline:none;border-color:var(--brand-line);box-shadow:0 0 0 3px var(--brand-soft)}
.view-toggle{display:none;flex:none;background:var(--panel);border:1px solid var(--line);
  border-radius:11px;padding:3px;gap:2px}
.view-toggle button{border:0;background:transparent;color:var(--sub);font-size:.78rem;
  font-weight:700;border-radius:8px;padding:6px 12px}
.view-toggle button.on{background:var(--card);color:var(--brand);box-shadow:var(--control-shadow)}
.guide-link{flex:none;width:40px;height:40px;display:grid;place-items:center;border:1px solid var(--line);
  border-radius:11px;background:var(--card);color:var(--sub);font-size:.76rem;font-weight:700}
.guide-link:hover{border-color:var(--brand-line);color:var(--brand)}
.guide-link svg{width:19px;height:19px}
.guide-link span{display:none}
.sample-banner{max-width:1248px;margin:14px auto 0;padding:8px 14px;border:1px solid var(--brand-line);
  border-radius:12px;background:var(--brand-soft);color:var(--brand-ink);font-size:.78rem;font-weight:700}
.main{max-width:1280px;margin:auto;padding:0 16px 42px}
.shelf-tools{display:flex;justify-content:flex-end;padding:20px 0 0}
.order-button{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);
  border-radius:10px;background:var(--card);color:var(--sub);font-size:.72rem;font-weight:700;padding:7px 10px}
.order-button:hover{border-color:var(--brand-line);color:var(--brand)}
.order-button svg{width:15px;height:15px}
.shelf-section{padding:18px 0 12px;scroll-margin-top:74px}
.shelf-heading{display:flex;align-items:center;gap:11px;margin-bottom:12px}
.shelf-grip{display:none;width:11px;height:16px;flex:none;color:var(--faint)}
@media(hover:hover){
  .shelf-heading{cursor:grab}
  .shelf-heading:hover .shelf-grip{display:block}
  .shelf-section.dragging{opacity:.55}
  .shelf-section{position:relative}
  .shelf-section.drop-before::before,.shelf-section.drop-after::after{
    content:"";position:absolute;left:0;right:0;height:3px;border-radius:2px;background:var(--brand);z-index:3}
  .shelf-section.drop-before::before{top:-2px}
  .shelf-section.drop-after::after{bottom:-2px}
}
.category-icon{width:34px;height:34px;flex:none;border-radius:10px;display:grid;place-items:center}
.category-icon svg{width:20px;height:20px}
.shelf-heading h2{font-size:1.08rem;font-weight:900}
.writer-count{font-size:.72rem;color:var(--faint);font-weight:500;margin-left:5px}
.shelf-rule{height:1px;background:var(--line);flex:1;margin-left:8px}
.shelf-arrows{display:none;align-items:center;gap:5px}
.shelf-arrow{width:34px;height:34px;display:grid;place-items:center;border:1px solid var(--line);
  border-radius:9px;background:var(--card);color:var(--sub)}
.shelf-arrow:hover{color:var(--brand);border-color:var(--brand-line)}
.shelf-arrow svg{width:16px;height:16px}
.writer-grid{display:flex;gap:12px;overflow-x:auto;scroll-snap-type:x mandatory;
  scrollbar-width:none;padding:2px 1px 12px;overscroll-behavior-inline:contain;touch-action:pan-x}
.writer-grid::-webkit-scrollbar{display:none}
@media(hover:hover){.writer-grid{cursor:grab}}
.writer-grid.drag-scrolling{cursor:grabbing;scroll-snap-type:none;user-select:none}
.writer-grid.drag-scrolling .writer-card{pointer-events:none}
.writer-card{flex:0 0 min(72vw,232px);width:232px;scroll-snap-align:start;background:var(--card);
  border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:14px;display:flex;flex-direction:column;min-height:360px;
  transition:transform .2s,box-shadow .2s,border-color .2s}
.writer-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-hover);border-color:var(--brand-line)}
.writer-identity{margin-bottom:8px}
.writer-top{display:flex;align-items:center;gap:9px}
.avatar-wrap{position:relative;flex:none;width:42px;height:42px}
.avatar-fallback,.avatar{position:absolute;inset:0;width:42px;height:42px;border-radius:50%}
.avatar-fallback{display:grid;place-items:center;font-size:.88rem;font-weight:900}
.avatar{object-fit:cover;background:var(--card)}
.writer-ident{display:flex;flex-direction:column;align-items:flex-start;gap:3px;min-width:0}
.writer-ident h3{min-width:0;font-size:.9rem;font-weight:800;line-height:1.3;min-height:2.6em;
  display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:2;overflow:hidden;word-break:break-word}
.badge{display:inline-flex;align-items:center;gap:5px;flex:none;border-radius:999px;
  padding:2px 8px;font-size:.62rem;font-weight:700}
.badge::before{content:"";width:5px;height:5px;border-radius:50%;background:currentColor;opacity:.72}
.bio{color:var(--sub);font-size:.72rem;line-height:1.45;margin-top:8px;min-height:2.9em;
  display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:2;overflow:hidden}
.latest{background:var(--panel);border-radius:9px;padding:7px 8px;display:grid;gap:0;margin-top:9px;
  grid-template-columns:minmax(0,1fr);align-content:start;min-height:112px}
.latest-label{font-size:.62rem;color:var(--faint);font-weight:700;letter-spacing:.08em;
  text-transform:uppercase;margin-bottom:1px}
.latest-link{display:block;min-width:0;max-width:100%;overflow:hidden;padding:6px 2px;
  font-size:.72rem;font-weight:500;line-height:1.5}
.latest-link+.latest-link{border-top:1px solid var(--line)}
.latest-link:hover{color:var(--brand);background:var(--brand-soft)}
.latest-title{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.latest-empty{font-size:.7rem;color:var(--faint);padding:6px 2px}
.topics{position:relative;margin-top:3px;border-radius:6px}
.topics:focus-visible{outline:2px solid var(--brand);outline-offset:3px}
.topics-bar{display:flex;width:100%;height:6px;border-radius:999px;overflow:hidden;background:var(--line)}
.topics-segment{height:100%}
.topics-legend{display:flex;gap:7px;overflow:hidden;margin-top:5px;color:var(--sub);
  font-size:.62rem;line-height:1.3;font-variant-numeric:tabular-nums;white-space:nowrap}
.topics-legend-item{display:inline-flex;align-items:center;gap:4px;white-space:nowrap}
.topics-dot{width:6px;height:6px;border-radius:50%;flex:none}
.topic-tooltip{position:fixed;z-index:80;width:max-content;min-width:190px;max-width:min(260px,calc(100vw - 24px));
  padding:10px 11px 8px;border:1px solid var(--line);border-radius:10px;background:var(--card);
  box-shadow:var(--tooltip-shadow);font-size:.72rem;line-height:1.45;
  pointer-events:none;opacity:0;transform:translateY(4px);transition:opacity .14s,transform .14s}
.topic-tooltip.show{opacity:1;transform:translateY(0)}
.topic-tooltip-row{display:grid;grid-template-columns:8px minmax(0,1fr) auto;align-items:center;gap:7px;padding:2px 0}
.topic-tooltip-dot{width:7px;height:7px;border-radius:50%}
.topic-tooltip-value{font-variant-numeric:tabular-nums;font-weight:700}
.topic-tooltip-footer{margin-top:6px;padding-top:6px;border-top:1px solid var(--line);color:var(--faint)}
.writer-footer{margin-top:auto;padding-top:9px}
.writer-button{display:flex;justify-content:center;align-items:center;gap:6px;width:100%;
  border:1px solid var(--brand-line);border-radius:10px;background:var(--brand-soft);
  color:var(--brand);font-size:.72rem;font-weight:900;padding:6px 9px}
.writer-button:hover{background:var(--brand);color:#fff}
.writer-button svg{width:14px;height:14px}
.no-results{text-align:center;color:var(--sub);padding:60px 16px}
.no-results svg{width:42px;height:42px;color:var(--faint);margin-bottom:10px}
.no-results b{display:block;color:var(--ink);font-size:1rem;margin-bottom:4px}
.article-layout{min-width:0}
.category-sidebar{display:none}
.article-content{min-width:0}
.article-tools{padding:12px 0 14px}
.filter-row{display:flex;gap:9px;align-items:center;flex-wrap:wrap}
.pills{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;padding:2px 0 9px}
.pills::-webkit-scrollbar{display:none}
.pill{flex:none;border:1px solid var(--line);border-radius:999px;background:var(--card);
  color:var(--sub);padding:6px 13px;font-size:.76rem;white-space:nowrap}
.pill.on{color:var(--brand);background:var(--brand-soft);border-color:var(--brand-line);font-weight:700}
.category-tabs{position:sticky;top:var(--header-height,61px);z-index:20;display:flex;
  gap:22px;overflow-x:auto;scrollbar-width:none;margin:0 -16px;padding:0 16px;
  background:var(--tabs-bg);border-bottom:1px solid var(--line);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  overscroll-behavior-inline:contain;touch-action:pan-x}
.category-tabs::-webkit-scrollbar{display:none}
.category-tab{position:relative;flex:none;border:0;background:transparent;color:var(--sub);
  padding:12px 1px 10px;font-size:.82rem;font-weight:700;white-space:nowrap}
.category-tab::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:2px;
  border-radius:2px;background:var(--brand);transform:scaleX(0);
  transition:transform .2s ease}
.category-tab.on{color:var(--brand)}
.category-tab.on::after{transform:scaleX(1)}
.article-order-button{margin-left:auto}
.article-count{margin-left:auto;color:var(--sub);font-size:.75rem}
.article-count b{color:var(--ink)}
.article-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:13px}
.article-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  overflow:hidden;box-shadow:var(--shadow);display:flex;flex-direction:column;min-width:0;
  transition:transform .2s,box-shadow .2s,border-color .2s}
.article-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-hover);border-color:var(--brand-line)}
.thumb{position:relative;flex:none;width:100%;aspect-ratio:16/9;background:var(--panel);overflow:hidden}
.thumb-placeholder{position:absolute;inset:0;display:grid;place-items:center}
.thumb-placeholder svg{width:32px;height:32px;opacity:.55}
.thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
  transition:transform .3s ease}
.article-card:hover .thumb img{transform:scale(1.035)}
.article-body{min-width:0;flex:1;padding:11px 12px 12px;display:flex;flex-direction:column;gap:6px}
.article-body .badge{align-self:flex-start;margin:0}
.article-body h3{font-size:.66rem;line-height:1.45;font-weight:700;
  display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:3;overflow:hidden}
.article-meta{display:flex;gap:7px;align-items:center;margin-top:auto;color:var(--faint);
  font-size:.67rem;min-width:0;padding-top:8px}
.article-writer{color:var(--sub);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.article-date{margin-left:auto;white-space:nowrap}
.more{display:block;margin:22px auto 0;border:1px solid var(--line);border-radius:999px;
  background:var(--card);color:var(--ink);font-weight:700;font-size:.78rem;padding:9px 24px}
.more:hover{border-color:var(--brand);color:var(--brand)}
footer{max-width:1248px;margin:auto;border-top:1px solid var(--line);padding:24px 16px 38px;
  color:var(--faint);font-size:.7rem}
.footer-links{display:block;margin-top:6px}
.footer-links a{color:var(--sub);text-decoration:underline;text-underline-offset:2px}
.footer-links a:hover{color:var(--brand)}
.bnav{position:fixed;z-index:25;left:0;right:0;bottom:0;display:flex;background:var(--nav-bg);
  border-top:1px solid var(--line);
  padding-bottom:env(safe-area-inset-bottom,0px);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.bnav button{flex:1;border:0;background:transparent;color:var(--faint);padding:10px 0 8px;
  display:flex;flex-direction:column;align-items:center;gap:1px;font-size:.61rem}
.bnav button svg{width:20px;height:20px}
.bnav button.on{color:var(--brand)}
.pwa-sheet{position:fixed;z-index:50;left:12px;right:12px;bottom:calc(64px + env(safe-area-inset-bottom));
  display:flex;align-items:flex-start;gap:11px;max-width:520px;margin:auto;padding:14px 42px 14px 14px;
  border:1px solid var(--brand-line);border-radius:16px;background:var(--card);box-shadow:var(--sheet-shadow);
  transform:translateY(24px);opacity:0;transition:transform .24s ease,opacity .24s ease}
.pwa-sheet.show{transform:translateY(0);opacity:1}
.pwa-sheet-icon{width:46px;height:46px;flex:none;border-radius:11px}
.pwa-sheet-body{min-width:0}
.pwa-sheet-title{font-size:.88rem;font-weight:900;line-height:1.35}
.pwa-sheet-text{margin-top:2px;color:var(--sub);font-size:.7rem;line-height:1.45}
.pwa-sheet-action{display:inline-flex;align-items:center;gap:6px;margin-top:9px;border:0;border-radius:9px;
  background:var(--brand);color:#fff;padding:7px 11px;font-size:.72rem;font-weight:900}
.pwa-sheet-action svg{width:15px;height:15px}
.pwa-sheet-close{position:absolute;top:8px;right:8px;width:32px;height:32px;border:0;
  border-radius:8px;background:transparent;color:var(--faint);font-size:1.25rem;line-height:1}
.modal-backdrop{position:fixed;z-index:60;inset:0;background:var(--modal-backdrop);
  display:grid;place-items:end center;padding:16px}
.order-modal{width:min(100%,430px);max-height:min(82vh,680px);overflow:auto;background:var(--card);
  border-radius:18px;padding:18px;box-shadow:var(--modal-shadow)}
.order-modal h2{font-size:1rem;font-weight:900}
.order-modal p{color:var(--sub);font-size:.72rem;margin-top:3px}
.order-list{list-style:none;display:grid;gap:7px;margin:15px 0}
.order-row{display:flex;align-items:center;gap:8px;border:1px solid var(--line);
  border-radius:11px;padding:4px 11px 4px 4px;
  transition:border-color .1s,opacity .15s;position:relative}
.order-row.dragging{opacity:.45}
.order-row.drop-before::before,.order-row.drop-after::after{
  content:"";position:absolute;left:0;right:0;height:2px;background:var(--brand)}
.order-row.drop-before::before{top:-5px}
.order-row.drop-after::after{bottom:-5px}
.order-grip-touch{width:28px;height:44px;display:flex;align-items:center;justify-content:center;
  color:var(--faint);cursor:grab;touch-action:none}
.order-grip-touch svg{width:14px;height:20px}
.order-name{min-width:0;flex:1;font-size:.78rem;font-weight:700}
.order-move-group{display:flex;gap:4px;margin-left:auto;flex:none}
.order-move{width:44px;height:44px;border:0;border-radius:8px;background:var(--panel);
  color:var(--sub);font-weight:900}
.order-move svg{width:17px;height:17px;vertical-align:middle}
.order-move:disabled{opacity:.3;cursor:default}
.modal-actions{display:flex;justify-content:flex-end;gap:8px}
.modal-action{border:1px solid var(--line);border-radius:10px;background:var(--card);
  color:var(--sub);font-size:.76rem;font-weight:700;padding:8px 13px}
.modal-action.primary{border-color:var(--brand);background:var(--brand);color:#fff}
[hidden]{display:none!important}
@media(min-width:700px){
  .view-toggle{display:flex}
  .guide-link{width:auto;padding:0 11px;display:flex;gap:6px}
  .guide-link span{display:inline}
  .writer-grid{scroll-snap-type:x proximity}
  .shelf-arrows{display:flex}
  .modal-backdrop{place-items:center}
}
@media(min-width:1040px){
  body{padding-bottom:0}
  .header-in{padding:12px 16px}
  .writer-grid{gap:16px}
  .article-layout{display:grid;grid-template-columns:160px minmax(0,1fr);gap:24px;align-items:start}
  .category-sidebar{display:block;position:sticky;top:76px;padding:22px 0}
  .category-sidebar h2{font-size:.68rem;color:var(--faint);font-weight:700;
    letter-spacing:.08em;margin:0 7px 7px}
  .category-list{list-style:none;display:grid;gap:3px}
  .category-sidebar-item{position:relative}
  .category-sidebar-button{width:100%;display:flex;align-items:center;gap:7px;border:0;
    border-radius:9px;background:transparent;color:var(--sub);padding:8px 7px;

  const text = String(value || "");

  try{

    return ["http:","https:"].includes(url.protocol) ? url.href : "#";
  }catch(_){

function formatDate(value){
  const date = new Date(value);
  if(Number.isNaN(date.getTime())) return "";
  const hours = (Date.now() - date.getTime()) / 36e5;
  if(hours < 24) return `${Math.max(1, Math.round(hours))}時間前`;
  if(hours < 24 * 7) return `${Math.round(hours / 24)}日前`;
  return date.toLocaleDateString("ja-JP",{month:"numeric",day:"numeric"});
}

  const defaults = defaultCategoryOrder();
  const saved = customCategoryOrder.filter(name => defaults.includes(name));
  return [...saved, ...defaults.filter(name => !saved.includes(name))];
}

function loadCategoryOrder(){
  try{
    const saved = JSON.parse(localStorage.getItem(ORDER_KEY) || "[]");
    customCategoryOrder = Array.isArray(saved) ? saved.filter(name => typeof name === "string") : [];
  }catch(_){
    customCategoryOrder = [];
  }
}

function saveCategoryOrder(order){
  customCategoryOrder = order;
  try{
    localStorage.setItem(ORDER_KEY, JSON.stringify(order));
  }catch(_){}
}

// 棚の見出しをポインタドラッグしてカテゴリ順を入れ替える（HTML5 DnD不使用・タッチ対応）
function enableShelfDnD(root){
  const sections = () => [...root.querySelectorAll(".shelf-section")];
  const clear = () => sections().forEach(s => s.classList.remove("drop-before","drop-after","dragging"));
  sections().forEach(section => {
    const name = section.dataset.shelfCategory;
    const heading = section.querySelector(".shelf-heading");
    heading.addEventListener("pointerdown", event => {
      if(event.target.closest(".shelf-arrow")) return;
      if(event.pointerType !== "mouse" || event.button !== 0) return; // タッチはページスクロール優先（並び替えはモーダルで）
      const startY = event.clientY;
      let active = false;
      let target = null, before = false;
      try{ heading.setPointerCapture(event.pointerId); }catch(_){}
      const move = ev => {
        if(!active && Math.abs(ev.clientY - startY) > 6){
          active = true;
          section.classList.add("dragging");
        }
        if(!active) return;
        ev.preventDefault();
        target = null;
        sections().forEach(s => s.classList.remove("drop-before","drop-after"));
        for(const s of sections()){
          if(s === section) continue;
          const rect = s.getBoundingClientRect();
          if(ev.clientY >= rect.top && ev.clientY <= rect.bottom){
            before = ev.clientY < rect.top + rect.height / 2;
            s.classList.add(before ? "drop-before" : "drop-after");
            target = s;
            break;
          }
        }
      };
      const up = ev => {
        heading.removeEventListener("pointermove", move);
        heading.removeEventListener("pointerup", up);
        heading.removeEventListener("pointercancel", up);
        if(!active){ clear(); return; }
        try{ heading.releasePointerCapture(ev.pointerId); }catch(_){}
        if(target){
          const next = categoryOrder().filter(n => n !== name);
          const index = next.indexOf(target.dataset.shelfCategory);
          next.splice(before ? index : index + 1, 0, name);
          saveCategoryOrder(next);
          renderShelf();
          renderCategorySidebar();
          renderCategoryPills();
          return;
        }
        clear();
      };
      heading.addEventListener("pointermove", move);
      heading.addEventListener("pointerup", up);
      heading.addEventListener("pointercancel", up);
    });
  });
}

// マウスドラッグで棚を横パンする（タッチはネイティブスクロールに任せる）
function enableDragScroll(row){
  let startX = 0, startLeft = 0, dragging = false, moved = false;
  row.addEventListener("pointerdown", event => {
    if(event.pointerType !== "mouse" || event.button !== 0) return;
    dragging = true; moved = false;
    startX = event.clientX; startLeft = row.scrollLeft;
  });
  row.addEventListener("pointermove", event => {
    if(!dragging) return;
    const delta = event.clientX - startX;
    if(!moved && Math.abs(delta) > 5){
      moved = true;
      row.classList.add("drag-scrolling");
      try{ row.setPointerCapture(event.pointerId); }catch(_){}
    }
    if(moved) row.scrollLeft = startLeft - delta;
  });
  const end = event => {
    if(!dragging) return;
    dragging = false;
    if(moved){
      try{ row.releasePointerCapture(event.pointerId); }catch(_){}
      // ドラッグ直後のクリックでカードのリンクが開かないように1回だけ握りつぶす
      row.addEventListener("click", e => { e.preventDefault(); e.stopPropagation(); }, {capture:true, once:true});
      requestAnimationFrame(() => row.classList.remove("drag-scrolling"));
    }
  };
  row.addEventListener("pointerup", end);
  row.addEventListener("pointercancel", end);
  row.addEventListener("dragstart", event => event.preventDefault());
}

function initOrderTouchDnd(listEl){
  let dragging = null;
  function rows(){ return [...listEl.querySelectorAll(".order-row")]; }
  function clearIndicators(){ rows().forEach(r => r.classList.remove("drop-before","drop-after")); }

  listEl.addEventListener("touchstart", e => {
    const row = e.target.closest(".order-row");
    if(!row) return;
    dragging = row;
    row.classList.add("dragging");
  }, {passive:true});

  listEl.addEventListener("touchmove", e => {
    if(!dragging) return;
    e.preventDefault();
    const y = e.touches[0].clientY;
    clearIndicators();
    const others = rows().filter(r => r !== dragging);
    let placed = false;
    for(const row of others){
      const r = row.getBoundingClientRect();
      if(y < r.top + r.height / 2){
        row.classList.add("drop-before");
        placed = true;
        break;
      }
    }
    if(!placed && others.length) others[others.length - 1].classList.add("drop-after");
  }, {passive:false});

  listEl.addEventListener("touchend", () => {
    if(!dragging) return;
    dragging.classList.remove("dragging");
    const before = listEl.querySelector(".order-row.drop-before");
    const after  = listEl.querySelector(".order-row.drop-after");
    if(before) listEl.insertBefore(dragging, before);
    else if(after) listEl.insertBefore(dragging, after.nextSibling);
    clearIndicators();
    const newOrder = rows().map(r => r.dataset.cat).filter(Boolean);
    saveCategoryOrder(newOrder);
    renderShelf();
    renderCategoryPills();
    renderCategorySidebar();
    dragging = null;
  }, {passive:true});

  listEl.addEventListener("touchcancel", () => {
    if(dragging) dragging.classList.remove("dragging");
    clearIndicators();
    dragging = null;
  }, {passive:true});
}

function periodMatches(value){
  const elapsed = (Date.now() - new Date(value).getTime()) / 36e5;
  return period === "all" ||
    (period === "day" && elapsed <= 24) ||
    (period === "week" && elapsed <= 24 * 7) ||
    (period === "month" && elapsed <= 24 * 31);
}

function isInsideHorizontalScroller(target, boundary){
  for(let element = target instanceof Element ? target : null;
    element && element !== boundary;
    element = element.parentElement){
    const style = getComputedStyle(element);
    const scrollable = ["auto","scroll"].includes(style.overflowX) &&
      element.scrollWidth > element.clientWidth + 1;
    if(scrollable) return true;
  }
  return false;
}

function initArticleSwipe(){
  const swipeArea = document.getElementById("articleGrid");
  let startX = 0;
  let startY = 0;
  let currentX = 0;
  let currentY = 0;
  let tracking = false;

  swipeArea.addEventListener("touchstart", event => {
    if(view !== "articles" || window.innerWidth >= 1040 || event.touches.length !== 1 ||
      isInsideHorizontalScroller(event.target, swipeArea)){
      tracking = false;
      return;
    }
    const touch = event.touches[0];
    startX = currentX = touch.clientX;
    startY = currentY = touch.clientY;
    tracking = true;
  },{passive:true});

  swipeArea.addEventListener("touchmove", event => {
    if(!tracking || event.touches.length !== 1) return;
    const touch = event.touches[0];
    currentX = touch.clientX;
    currentY = touch.clientY;
    const deltaX = currentX - startX;
    const deltaY = currentY - startY;
    if(Math.abs(deltaX) > 12 && Math.abs(deltaX) > Math.abs(deltaY)){
      event.preventDefault();
    }
  },{passive:false});

  swipeArea.addEventListener("touchend", event => {
    if(!tracking) return;
    if(event.changedTouches.length){
      currentX = event.changedTouches[0].clientX;
      currentY = event.changedTouches[0].clientY;
    }
    tracking = false;
    const deltaX = currentX - startX;
    const deltaY = currentY - startY;
    if(Math.abs(deltaX) <= 60 || Math.abs(deltaX) <= Math.abs(deltaY)) return;
    const categories = ["すべて", ...categoryOrder()];
    const currentIndex = categories.indexOf(category);
    const nextIndex = deltaX < 0 ? currentIndex + 1 : currentIndex - 1;
    if(nextIndex < 0 || nextIndex >= categories.length) return;
    setCategory(categories[nextIndex]);
  },{passive:true});

  swipeArea.addEventListener("touchcancel", () => {
    tracking = false;
  },{passive:true});
}

function updateHeaderHeight(){
  const header = document.querySelector(".header");
  document.documentElement.style.setProperty("--header-height", `${header.offsetHeight}px`);
}

function initTopicTooltip(){
  const tooltip = document.getElementById("topicTooltip");
  let active = null;
  let tapped = null;

  function hide(){
    active = null;
    tapped = null;
    tooltip.classList.remove("show");
    tooltip.hidden = true;
  }

  function show(target){
    let data;
    try{
      data = JSON.parse(target.dataset.topics || "{}");
    }catch(_){
      return;
    }
    if(!Array.isArray(data.topics) || !data.topics.length) return;
    tooltip.replaceChildren();
    data.topics.forEach(topic => {
      const row = document.createElement("div");
      row.className = "topic-tooltip-row";
      const dot = document.createElement("span");
      dot.className = "topic-tooltip-dot";
      dot.style.background = topicColor(topic.label);
      const label = document.createElement("span");
      label.textContent = topic.label;
      const value = document.createElement("span");
      value.className = "topic-tooltip-value";
      value.textContent = `${Number(topic.pct).toFixed(1)}%`;
      row.append(dot,label,value);
      tooltip.append(row);
    });
    const footer = document.createElement("div");
    footer.className = "topic-tooltip-footer";
    footer.textContent = `直近${Number(data.sample_n) || 0}件の記事から算出`;
    tooltip.append(footer);
    tooltip.hidden = false;
    active = target;
    const rect = target.getBoundingClientRect();
    const tip = tooltip.getBoundingClientRect();
    const left = Math.min(window.innerWidth - tip.width - 8, Math.max(8, rect.left + rect.width / 2 - tip.width / 2));
    const above = rect.top >= tip.height + 10;
    tooltip.style.left = `${left}px`;
    tooltip.style.top = `${above ? rect.top - tip.height - 8 : rect.bottom + 8}px`;
    requestAnimationFrame(() => tooltip.classList.add("show"));
  }

  document.addEventListener("mouseover", event => {
    const target = event.target.closest(".topics[data-topics]");
    if(target && !target.contains(event.relatedTarget)) show(target);
  });
  document.addEventListener("mouseout", event => {
    const target = event.target.closest(".topics[data-topics]");
    if(target && !target.contains(event.relatedTarget)) hide();
  });
  document.addEventListener("focusin", event => {
    const target = event.target.closest(".topics[data-topics]");
    if(target) show(target);
  });
  document.addEventListener("focusout", event => {
    const target = event.target.closest(".topics[data-topics]");
    if(target && !target.contains(event.relatedTarget)) hide();
  });
  document.addEventListener("click", event => {
    const target = event.target.closest(".topics[data-topics]");
    if(target && window.innerWidth < 1040){
      event.preventDefault();
      if(tapped === target){
        hide();
      }else{
        show(target);
        tapped = target;
      }
    }else if(!target){
      hide();
    }
  });
  window.addEventListener("scroll", hide,{passive:true});
  window.addEventListener("resize", hide);
}

function initPwaPrompt(){
  const key = "sp_pwa_prompt_seen_v1";
  const sheet = document.getElementById("pwaSheet");
  const action = document.getElementById("pwaAction");
  const text = document.getElementById("pwaText");
  const isStandalone = window.matchMedia("(display-mode: standalone)").matches || navigator.standalone;
  const isIos = /iPhone|iPad|iPod/.test(navigator.userAgent);
  let installPrompt = null;
  let delayPassed = false;
  let seen = false;
  try{ seen = localStorage.getItem(key) === "1"; }catch(_){}
  if(seen || isStandalone || window.innerWidth >= 1040) return;

  function markSeen(){
    try{ localStorage.setItem(key,"1"); }catch(_){}
  }
  function hide(mark = true){
    sheet.classList.remove("show");
    if(mark) markSeen();
    setTimeout(() => { sheet.hidden = true; }, prefersReducedMotion() ? 0 : 240);
  }
  function show(){
    if(!delayPassed || (!installPrompt && !isIos) || !sheet.hidden) return;
    if(isIos){
      text.textContent = "共有ボタンから「ホーム画面に追加」を選んでください。";
      action.replaceChildren();
      const icon = document.createElementNS("http://www.w3.org/2000/svg","svg");
      icon.setAttribute("viewBox","0 0 24 24");
      icon.setAttribute("fill","none");
      icon.setAttribute("stroke","currentColor");
      icon.setAttribute("stroke-width","1.8");
      icon.setAttribute("aria-hidden","true");
      icon.innerHTML = '<path d="M12 16V3M8 7l4-4 4 4M5 12v8h14v-8"/>';
      action.append(icon,document.createTextNode("共有 → ホーム画面に追加"));
      action.disabled = true;
    }
    sheet.hidden = false;
    requestAnimationFrame(() => sheet.classList.add("show"));
  }

  window.addEventListener("beforeinstallprompt", event => {
    event.preventDefault();
    installPrompt = event;
    show();
  });
  window.addEventListener("appinstalled", () => hide(true));
  action.addEventListener("click", async () => {
    if(!installPrompt) return;
    await installPrompt.prompt();
    installPrompt = null;
    hide(true);
  });
  document.getElementById("pwaClose").addEventListener("click", () => hide(true));
  setTimeout(() => {
    delayPassed = true;
    show();
  },2500);
}

function initHideOnScroll(){
  const header = document.querySelector(".header");
  let lastY = 0, ticking = false;
  window.addEventListener("scroll", () => {
    if(ticking) return;
    ticking = true;
    requestAnimationFrame(() => {
      const y = window.scrollY;
      if(y < 10){
        header.classList.remove("header--hidden");
        document.documentElement.style.setProperty("--header-height", `${header.offsetHeight}px`);
      } else if(y > lastY + 4){
        header.classList.add("header--hidden");
        document.documentElement.style.setProperty("--header-height", "0px");
      } else if(y < lastY - 4){
        header.classList.remove("header--hidden");
        document.documentElement.style.setProperty("--header-height", `${header.offsetHeight}px`);
      }
      lastY = y;
      ticking = false;
    });
  }, {passive:true});
}

function init(){
  DATA.articles.sort((a,b) => new Date(b.published) - new Date(a.published));
  loadCategoryOrder();
  document.getElementById("updatedAt").textContent = DATA.updated_at
    ? new Date(DATA.updated_at).toLocaleString("ja-JP")
    : "サンプルデータ";
  initFilters();
  initArticleSwipe();
  initTopicTooltip();
  initPwaPrompt();
  initHideOnScroll();
  updateHeaderHeight();
  renderShelf();
  setView(location.hash === "#writers" ? "shelf" : "articles", false);

  document.querySelectorAll("[data-view]").forEach(button =>
    button.addEventListener("click", () => setView(button.dataset.view))
  );
  document.querySelectorAll("[data-mobile-view]").forEach(button =>
    button.addEventListener("click", () => setView(button.dataset.mobileView))
  );
  document.getElementById("searchInput").addEventListener("keydown", e => {
    if(e.key === "Enter") e.currentTarget.blur();
  });
  document.getElementById("searchInput").addEventListener("input", event => {
    query = event.target.value.trim();
    shown = PAGE_SIZE;
    if(view === "shelf") renderShelf();
    else if(API_MODE) resetApiArticles();
    else renderArticles();
  });
  document.getElementById("mobileSearch").addEventListener("click", () => {
    const input = document.getElementById("searchInput");
    input.scrollIntoView({block:"center",behavior:"smooth"});
    input.focus();
  });
  document.getElementById("moreButton").addEventListener("click", async () => {
    if(API_MODE) await loadNextApiPage();
    else{
      shown += PAGE_SIZE;
      renderArticles();
    }
  });
  (function(){
    const io = new IntersectionObserver(entries => {
      if(!entries[0].isIntersecting) return;
      if(API_MODE){
        if(apiHasMore && !apiLoading) loadNextApiPage();
        return;
      }
      if(document.getElementById("moreButton").hidden) return;
      shown += PAGE_SIZE;
      renderArticles();
    }, {rootMargin:"400px"});
    io.observe(document.getElementById("loadSentinel"));
  })();
  document.getElementById("sidebarOrderOpen").addEventListener("click", openOrderModal);
  document.getElementById("articleOrderOpen").addEventListener("click", openOrderModal);
  document.getElementById("orderClose").addEventListener("click", closeOrderModal);
  document.getElementById("orderReset").addEventListener("click", () => {
    saveCategoryOrder([]);
    renderOrderList();
    renderShelf();
    renderCategoryPills();
    renderCategorySidebar();
  });
  document.getElementById("orderBackdrop").addEventListener("click", event => {
    if(event.target === event.currentTarget) closeOrderModal();
  });
  document.addEventListener("keydown", event => {
    if(event.key === "Escape" && !document.getElementById("orderBackdrop").hidden) closeOrderModal();
  });
  window.addEventListener("resize", () => {
    updateHeaderHeight();
    document.querySelectorAll("[data-shelf]").forEach(shelf => {
      const row = shelf.querySelector(".writer-grid");
      shelf.querySelector(".shelf-arrows").hidden = row.scrollWidth <= row.clientWidth + 1;
    });
  });
}

function apiArticlesUrl(page){
  const params = new URLSearchParams({limit:String(API_PAGE_SIZE),page:String(page)});
  if(category !== "すべて") params.set("category",category);
  if(query) params.set("q",query);
  return `${WORKER_URL}/api/articles?${params}`;
}

async function fetchJson(url){
  const response = await fetch(url);
  if(!response.ok) throw new Error(`${url}: HTTP ${response.status}`);
  return response.json();
}

async function resetApiArticles(){
  const requestId = ++apiRequestId;
  apiLoading = true;
  apiPage = 1;
  apiHasMore = false;
  apiTotal = 0;
  DATA.articles = [];
  renderArticles();
  try{
    const loaded = await fetchJson(apiArticlesUrl(1));
    if(requestId !== apiRequestId) return;
    DATA.articles = Array.isArray(loaded.articles) ? loaded.articles : [];
    apiPage = Number(loaded.page) || 1;
    apiHasMore = Boolean(loaded.hasMore);
    apiTotal = Number(loaded.total) || 0;
    renderArticles();
  }catch(error){
    if(requestId === apiRequestId) console.warn("Find Your Letter API request failed",error);
  }finally{
    if(requestId === apiRequestId) apiLoading = false;
  }
}

async function loadNextApiPage(){
  if(!API_MODE || apiLoading || !apiHasMore) return;
  const requestId = apiRequestId;
  apiLoading = true;
  try{
    const loaded = await fetchJson(apiArticlesUrl(apiPage + 1));
    if(requestId !== apiRequestId) return;
    DATA.articles.push(...(Array.isArray(loaded.articles) ? loaded.articles : []));
    apiPage = Number(loaded.page) || apiPage + 1;
    apiHasMore = Boolean(loaded.hasMore);
    apiTotal = Number(loaded.total) || apiTotal;
    renderArticles();
  }catch(error){
    console.warn("Find Your Letter API request failed",error);
  }finally{
    if(requestId === apiRequestId) apiLoading = false;
  }
}

async function loadStaticData(){
  const response = await fetch("data/articles.json",{cache:"no-store"});
  if(!response.ok) throw new Error("data request failed");
  const loaded = await response.json();
  if(!Array.isArray(loaded.writers) || loaded.writers.length === 0) throw new Error("writer data is empty");
  return {
    updated_at: loaded.updated_at || "",
    categories: Array.isArray(loaded.categories) ? loaded.categories : [],
    writers: loaded.writers,
    articles: Array.isArray(loaded.articles) ? loaded.articles : []
  };
}

async function load(){
  let sample = false;
  const topicsPromise = Promise.allSettled([
    fetch("data/topics.json",{cache:"no-store"})
  ]);
  try{
    if(API_MODE){
      const [articles, writers] = await Promise.all([
        fetchJson(`${WORKER_URL}/api/articles?limit=${API_PAGE_SIZE}&page=1`),
        fetchJson(`${WORKER_URL}/api/writers`)
      ]);
      if(!Array.isArray(writers.writers) || writers.writers.length < 10) throw new Error("writer data insufficient, fallback to static");
      DATA = {
        updated_at:articles.articles?.[0]?.published || "",
        categories:[...new Set(writers.writers.flatMap(writer =>
          Array.isArray(writer.categories) ? writer.categories : []
        ))],
        writers:writers.writers,
        articles:Array.isArray(articles.articles) ? articles.articles : []
      };
      apiPage = Number(articles.page) || 1;
      apiHasMore = Boolean(articles.hasMore);
      apiTotal = Number(articles.total) || 0;
    }else{
      DATA = await loadStaticData();
    }
  }catch(error){
    if(API_MODE) console.warn("Find Your Letter API initial load failed; using static data",error);
    API_MODE = false;
    try{
      DATA = await loadStaticData();
    }catch(_){
      DATA = SAMPLE;
      sample = true;
    }
  }
  const topicsResult = await topicsPromise;
  if(topicsResult[0].status === "fulfilled" && topicsResult[0].value.ok){
    try{
      const loadedTopics = await topicsResult[0].value.json();
      if(loadedTopics && typeof loadedTopics.writers === "object") TOPICS = loadedTopics;
    }catch(_){
      TOPICS = null;
    }
  }
  document.getElementById("sampleBanner").hidden = !sample;
  init();
}

/* 横スクロール要素の縦移動ロック: touchmoveの途中タッチも含めて制御 */
(function(){
  let startX=0, startY=0, locked=null, target=null;
  document.addEventListener("touchstart", e => {
    target = e.target.closest(".category-tabs");
    if(!target || e.touches.length !== 1){ locked=null; return; }
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    locked = null;
  }, {passive:true});
  document.addEventListener("touchmove", e => {
    if(!target || e.touches.length !== 1) return;
    if(locked === null){
      const dx = Math.abs(e.touches[0].clientX - startX);
      const dy = Math.abs(e.touches[0].clientY - startY);
      if(dx > 4 || dy > 4) locked = dx > dy;
    }
    if(locked) e.preventDefault();
  }, {passive:false});
  const reset = () => { locked=null; target=null; };
  document.addEventListener("touchend", reset, {passive:true});
  document.addEventListener("touchcancel", reset, {passive:true});
})();

load();
if("serviceWorker" in navigator){
  window.addEventListener("load", () => navigator.serviceWorker.register("./sw.js").catch(() => {}));
}
