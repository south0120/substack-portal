name: Classify writer topics

on:
  schedule:
    - cron: "40 * * * *"
  workflow_dispatch:
    inputs:
      limit:
        description: "Maximum articles to classify this run"
        required: false
        default: ""
        type: string

permissions:
  contents: write

jobs:
  classify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install classifier dependency
        run: pip install certifi

      - name: Classify writer topics
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CLASSIFY_LIMIT: ${{ github.event.inputs.limit }}
          CLASSIFY_TOKEN: ${{ secrets.CLASSIFY_TOKEN }}
        run: python scripts/classify.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git add docs/data/topics.json docs/data/api_usage.json docs/data/article_categories.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: update shelf topics"
          git rebase origin/main
          git push
