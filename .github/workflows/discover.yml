name: Discover writers

# Substack の推薦グラフを巡回して、未登録のアクティブな日本語ニュースレターを
# 自動発見し feeds.json に追加する。週次（手動実行も可）。
on:
  schedule:
    - cron: "30 16 * * 1"   # 毎週月曜 16:30 UTC（≒火曜 1:30 JST）
  workflow_dispatch:
    inputs:
      seeds:
        description: "種にする既存pub数"
        default: "40"
      hops:
        description: "推薦グラフを辿る深さ"
        default: "3"
      max_new:
        description: "1回で追加する最大数"
        default: "60"

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install certifi

      - name: Discover writers via recommendation graph
        env:
          # GitHub の IP は Substack に弾かれるため Worker プロキシ経由で取得する
          FYL_PROXY_URL: https://fyl-api.south0120.workers.dev
          FYL_PROXY_SECRET: ${{ secrets.FYL_PROXY_SECRET }}
        run: |
          python scripts/discover.py \
            --seeds "${{ github.event.inputs.seeds || '40' }}" \
            --hops "${{ github.event.inputs.hops || '3' }}" \
            --max-new "${{ github.event.inputs.max_new || '60' }}"

      - name: Commit new writers
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add feeds.json
          git diff --cached --quiet && echo "no new writers" && exit 0
          git commit -m "chore: discover new writers via recommendation graph"
          git fetch origin main
          git rebase origin/main
          git push
