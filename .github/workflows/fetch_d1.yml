name: Fetch RSS to D1

on:
  schedule:
    - cron: "*/10 * * * *"          # 通常: 10分ごと
    - cron: "*/5 22-23 * * *"       # 朝の更新ラッシュ窓(7:00-8:59 JST=22-23時UTC)は5分ごとに密に
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install certifi

      - name: Fetch RSS feeds to D1
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          FYL_PROXY_SECRET: ${{ secrets.FYL_PROXY_SECRET }}
        run: python scripts/fetch_to_d1.py
