name = "fyl-email"
main = "index.js"
compatibility_date = "2026-05-01"

# 遅延リトライ: 5分毎に直近の空カバー投稿を後追いでカバー補完する（scheduled ハンドラ）。
[triggers]
crons = ["*/5 * * * *"]

# 受信した生メール(.eml)を貯める R2 バケット。
# 事前に `npx wrangler r2 bucket create fyl-emails` で作成しておくこと。
[[r2_buckets]]
binding = "EMAILS"
bucket_name = "fyl-emails"

# 本番D1。受信メールを email() ハンドラから直接 upsert する（push 取込）。
# このバインドが付くと Stage2 が有効化される（無ければ R2 保存のみ＝Stage1 のまま）。
[[d1_databases]]
binding = "DB"
database_name = "fyl-articles"
database_id = "059349fc-d32a-4422-93de-af77b7a7317f"

[env.staging]
name = "fyl-email-staging"

[[env.staging.r2_buckets]]
binding = "EMAILS"
bucket_name = "fyl-emails"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "fyl-articles-staging"
database_id = "237e1aa6-a02a-4ffb-a71c-11214aa5303d"
