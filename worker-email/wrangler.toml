name = "fyl-email"
main = "index.js"
compatibility_date = "2026-05-01"

# 受信した生メール(.eml)を貯める R2 バケット。
# 事前に `npx wrangler r2 bucket create fyl-emails` で作成しておくこと。
[[r2_buckets]]
binding = "EMAILS"
bucket_name = "fyl-emails"

[env.staging]
name = "fyl-email-staging"

[[env.staging.r2_buckets]]
binding = "EMAILS"
bucket_name = "fyl-emails"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "fyl-articles-staging"
database_id = "237e1aa6-a02a-4ffb-a71c-11214aa5303d"
